<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            background: #0f0f23;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .overlay p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #e2e8f0;
        }

        .game-over-overlay {
            background: rgba(220, 38, 38, 0.85);
            animation: flashRed 0.5s ease-in-out 3;
        }

        @keyframes flashRed {
            0%, 100% { background: rgba(220, 38, 38, 0.85); }
            50% { background: rgba(239, 68, 68, 0.95); }
        }

        .pause-overlay {
            background: rgba(0, 0, 0, 0.6);
        }

        .pause-overlay h2 {
            font-size: 2.5rem;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            pointer-events: none;
        }

        .stats {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .stats div {
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .stats span {
            font-weight: bold;
            color: #4ade80;
        }

        .stats .high-score span {
            color: #fbbf24;
        }

        .stats .speed-level span {
            color: #60a5fa;
        }

        .controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 5;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.6);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(74, 222, 128, 0.4);
        }

        button.pause-btn {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }

        button.pause-btn:hover {
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.6);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 40px 60px;
            border-radius: 16px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            border: 2px solid #ef4444;
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.3);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal h2 {
            font-size: 2rem;
            color: #ef4444;
            margin-bottom: 20px;
        }

        .modal p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #e2e8f0;
        }

        .modal p span {
            color: #4ade80;
            font-weight: bold;
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .instructions span {
            color: #fbbf24;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-panel">
            <div class="stats">
                <div class="score">得分: <span id="score">0</span></div>
                <div class="high-score">最高分: <span id="highScore">0</span></div>
                <div class="length">长度: <span id="length">3</span></div>
            </div>
            <div class="stats">
                <div class="speed-level">速度等级: <span id="speedLevel">1</span>/10</div>
            </div>
        </div>

        <div class="controls">
            <button id="pauseBtn" class="pause-btn">暂停 (P)</button>
            <button id="restartBtn">重新开始</button>
        </div>

        <div id="startOverlay" class="overlay">
            <h1>🐍 贪吃蛇游戏</h1>
            <p>按空格键或点击开始</p>
            <div class="instructions">
                使用 <span>↑↓←→</span> 或 <span>WASD</span> 控制方向<br>
                按 <span>P</span> 暂停/继续 | 吃 <span>金色食物</span> 得3分
            </div>
        </div>

        <div id="pauseOverlay" class="overlay pause-overlay hidden">
            <h2>⏸ 暂停中</h2>
            <p>按 P 键或点击按钮继续</p>
        </div>

        <div id="gameOverOverlay" class="overlay game-over-overlay hidden">
            <h1>💀 游戏结束</h1>
            <p>最终得分: <span id="finalScore">0</span></p>
        </div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h2>游戏结束</h2>
            <p>得分: <span id="modalScore">0</span></p>
            <button id="modalRestartBtn">确定</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 20;
        const INITIAL_SPEED = 150;
        const MIN_SPEED = 50;
        const INITIAL_LENGTH = 3;
        
        let cols, rows;
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let goldenFood = null;
        let goldenFoodTimer = null;
        let score = 0;
        let highScore = 0;
        let gameLoop = null;
        let speed = INITIAL_SPEED;
        let speedLevel = 1;
        let isGameRunning = false;
        let isPaused = false;
        let isGameOver = false;
        let foodEaten = 0;

        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            cols = Math.floor(canvas.width / GRID_SIZE);
            rows = Math.floor(canvas.height / GRID_SIZE);
        }

        function init() {
            resizeCanvas();
            highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
            updateHighScoreDisplay();
            resetGame();
            draw();
        }

        function resetGame() {
            snake = [];
            const startX = Math.floor(cols / 4);
            const startY = Math.floor(rows / 2);
            
            for (let i = 0; i < INITIAL_LENGTH; i++) {
                snake.push({ x: startX - i, y: startY });
            }
            
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = INITIAL_SPEED;
            speedLevel = 1;
            foodEaten = 0;
            isGameOver = false;
            isPaused = false;
            isGameRunning = false;
            
            if (goldenFoodTimer) {
                clearTimeout(goldenFoodTimer);
                goldenFoodTimer = null;
            }
            goldenFood = null;
            
            spawnFood();
            updateUI();
            
            document.getElementById('startOverlay').classList.remove('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('gameOverModal').classList.remove('show');
            document.getElementById('pauseBtn').textContent = '暂停 (P)';
        }

        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            document.getElementById('startOverlay').classList.add('hidden');
            gameLoop = setInterval(update, speed);
        }

        function spawnFood() {
            let attempts = 0;
            do {
                food.x = Math.floor(Math.random() * cols);
                food.y = Math.floor(Math.random() * rows);
                attempts++;
            } while (isOccupied(food.x, food.y) && attempts < 1000);
            
            if (Math.random() < 0.1 && !goldenFood) {
                spawnGoldenFood();
            }
        }

        function spawnGoldenFood() {
            let attempts = 0;
            do {
                goldenFood = {
                    x: Math.floor(Math.random() * cols),
                    y: Math.floor(Math.random() * rows)
                };
                attempts++;
            } while ((isOccupied(goldenFood.x, goldenFood.y) || 
                     (goldenFood.x === food.x && goldenFood.y === food.y)) && 
                     attempts < 1000);
            
            if (goldenFoodTimer) {
                clearTimeout(goldenFoodTimer);
            }
            
            goldenFoodTimer = setTimeout(() => {
                goldenFood = null;
                goldenFoodTimer = null;
            }, 5000);
        }

        function isOccupied(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        function update() {
            if (isPaused || isGameOver) return;
            
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            if (checkCollision(head)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            let ateFood = false;
            
            if (head.x === food.x && head.y === food.y) {
                score += 1;
                foodEaten++;
                ateFood = true;
                spawnFood();
                updateSpeed();
            } else if (goldenFood && head.x === goldenFood.x && head.y === goldenFood.y) {
                score += 3;
                ateFood = true;
                
                if (snake.length > INITIAL_LENGTH) {
                    snake.pop();
                }
                
                if (goldenFoodTimer) {
                    clearTimeout(goldenFoodTimer);
                    goldenFoodTimer = null;
                }
                goldenFood = null;
                
                foodEaten++;
                updateSpeed();
            }
            
            if (!ateFood) {
                snake.pop();
            }
            
            updateUI();
            draw();
        }

        function checkCollision(head) {
            if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
                return true;
            }
            
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return true;
                }
            }
            
            return false;
        }

        function updateSpeed() {
            const newLevel = Math.min(10, Math.floor(foodEaten / 5) + 1);
            if (newLevel > speedLevel) {
                speedLevel = newLevel;
                speed = Math.max(MIN_SPEED, INITIAL_SPEED - (speedLevel - 1) * 10);
                
                if (gameLoop) {
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            isGameRunning = false;
            
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            
            if (goldenFoodTimer) {
                clearTimeout(goldenFoodTimer);
                goldenFoodTimer = null;
            }
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                updateHighScoreDisplay();
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('modalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('gameOverModal').classList.add('show');
            }, 1500);
        }

        function togglePause() {
            if (isGameOver || !isGameRunning) return;
            
            isPaused = !isPaused;
            const pauseOverlay = document.getElementById('pauseOverlay');
            const pauseBtn = document.getElementById('pauseBtn');
            
            if (isPaused) {
                pauseOverlay.classList.remove('hidden');
                pauseBtn.textContent = '继续 (P)';
            } else {
                pauseOverlay.classList.add('hidden');
                pauseBtn.textContent = '暂停 (P)';
            }
        }

        function draw() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= cols; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= rows; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            drawFood(food.x, food.y, '#ef4444');
            
            if (goldenFood) {
                const pulse = Math.sin(Date.now() / 100) * 0.2 + 0.8;
                drawFood(goldenFood.x, goldenFood.y, '#fbbf24', pulse);
            }
            
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const alpha = 1 - (index / snake.length) * 0.4;
                
                if (isGameOver && Math.floor(Date.now() / 150) % 2 === 0) {
                    ctx.fillStyle = `rgba(239, 68, 68, ${alpha})`;
                } else {
                    ctx.fillStyle = isHead 
                        ? `rgba(74, 222, 128, ${alpha})` 
                        : `rgba(34, 197, 94, ${alpha})`;
                }
                
                const padding = 1;
                const x = segment.x * GRID_SIZE + padding;
                const y = segment.y * GRID_SIZE + padding;
                const size = GRID_SIZE - padding * 2;
                
                ctx.beginPath();
                ctx.roundRect(x, y, size, size, 4);
                ctx.fill();
                
                if (isHead) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    if (direction.x === 1) {
                        ctx.beginPath();
                        ctx.arc(x + size - eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - eyeOffset, y + size - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.x === -1) {
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + eyeOffset, y + size - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === 1) {
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + size - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - eyeOffset, y + size - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(x + eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - eyeOffset, y + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        }

        function drawFood(x, y, color, scale = 1) {
            const centerX = x * GRID_SIZE + GRID_SIZE / 2;
            const centerY = y * GRID_SIZE + GRID_SIZE / 2;
            const radius = (GRID_SIZE / 2 - 2) * scale;
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius * 1.5);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
            document.getElementById('speedLevel').textContent = speedLevel;
        }

        function updateHighScoreDisplay() {
            document.getElementById('highScore').textContent = highScore;
        }

        function handleKeyDown(e) {
            if (e.key === ' ' && !isGameRunning && !isGameOver) {
                e.preventDefault();
                startGame();
                return;
            }
            
            if (e.key.toLowerCase() === 'p') {
                e.preventDefault();
                togglePause();
                return;
            }
            
            if (isPaused || isGameOver || !isGameRunning) {
                return;
            }
            
            let newDirection = null;
            
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) newDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) newDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) newDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) newDirection = { x: 1, y: 0 };
                    break;
            }
            
            if (newDirection) {
                e.preventDefault();
                nextDirection = newDirection;
            }
        }

        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('restartBtn').addEventListener('click', () => {
            resetGame();
            draw();
        });
        document.getElementById('modalRestartBtn').addEventListener('click', () => {
            resetGame();
            draw();
        });
        document.getElementById('startOverlay').addEventListener('click', () => {
            if (!isGameRunning && !isGameOver) {
                startGame();
            }
        });

        document.addEventListener('keydown', handleKeyDown);
        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });

        init();
    </script>
</body>
</html>
